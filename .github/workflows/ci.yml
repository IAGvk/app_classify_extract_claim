name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy types-Pillow
          pip install -r requirements.txt

      # The git repo is checked out as 'lg_practice/' but the package is
      # 'app_classify_extract_claim'. Create a symlink so mypy can resolve imports.
      - name: Make package importable
        run: ln -s "$GITHUB_WORKSPACE" "$(dirname "$GITHUB_WORKSPACE")/app_classify_extract_claim"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        env:
          PYTHONPATH: "${{ github.workspace }}/.."
        run: |
          mypy . \
            --exclude 'tests/' \
            --exclude 'data/'

  test:
    name: Test suite (mock LLM)
    runs-on: ubuntu-latest
    needs: quality
    env:
      MOCK_LLM: "true"
      GCP_PROJECT_ID: "ci-test-project"
      # pyproject.toml sets pythonpath=[".."]; combined with the symlink below
      # that resolves to a directory containing app_classify_extract_claim/
      PYTHONPATH: "${{ github.workspace }}/.."
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Repo is checked out as 'lg_practice/' but package is 'app_classify_extract_claim'.
      - name: Make package importable
        run: ln -s "$GITHUB_WORKSPACE" "$(dirname "$GITHUB_WORKSPACE")/app_classify_extract_claim"

      - name: Install all dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  docs:
    name: Build & deploy docs
    runs-on: ubuntu-latest
    needs: test
    # Deploy only on push to main (not on PRs — avoids publishing draft docs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write       # required by actions/deploy-pages
      id-token: write    # required by actions/deploy-pages (OIDC)
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-docs.txt
          pip install -r requirements.txt

      # Repo is checked out as 'lg_practice/' but mkdocstrings needs to import
      # 'app_classify_extract_claim'. Create a symlink in the parent directory.
      - name: Make package importable
        run: ln -s "$GITHUB_WORKSPACE" "$(dirname "$GITHUB_WORKSPACE")/app_classify_extract_claim"

      - name: Build docs
        env:
          PYTHONPATH: "${{ github.workspace }}/.."
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
