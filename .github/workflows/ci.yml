name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy types-Pillow
          pip install -r app_classify_extract_claim/requirements.txt

      - name: Ruff lint
        run: ruff check app_classify_extract_claim

      - name: Ruff format check
        run: ruff format --check app_classify_extract_claim

      - name: Mypy type check
        run: |
          PYTHONPATH=. mypy app_classify_extract_claim \
            --exclude 'tests/' \
            --exclude 'data/'

  test:
    name: Test suite (mock LLM)
    runs-on: ubuntu-latest
    needs: quality
    env:
      MOCK_LLM: "true"
      GCP_PROJECT_ID: "ci-test-project"
      PYTHONPATH: "."
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install all dependencies
        run: |
          pip install --upgrade pip
          pip install -r app_classify_extract_claim/requirements.txt
          pip install -r app_classify_extract_claim/requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest app_classify_extract_claim/tests \
            --cov=app_classify_extract_claim \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
