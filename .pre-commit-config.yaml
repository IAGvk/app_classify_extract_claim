# Pre-commit hooks — runs automatically on `git commit`
# Install:  pip install pre-commit && pre-commit install
# Run manually:  pre-commit run --all-files

repos:
  # ── Ruff: lint + import sort + auto-fix ─────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── Standard file hygiene ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: ^tests/sample_data/  # fixture files may have comments (_comment key)
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: debug-statements          # catch leftover breakpoint() / pdb
      - id: detect-private-key        # never commit credentials

  # ── Secret scanning ──────────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: |
          (?x)^(
            tests/sample_data/.*|
            \.env\.example
          )$
